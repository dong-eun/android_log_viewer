name: Build Windows executable

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Build Windows application
        run: python -m PyInstaller --clean --noconfirm android_log_viewer.spec

      - name: Verify executable
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/AndroidLogViewer/AndroidLogViewer.exe")) {
            throw "AndroidLogViewer.exe was not created."
          }

      - name: Create distribution archive
        shell: pwsh
        run: Compress-Archive -Path "dist/AndroidLogViewer" -DestinationPath "dist/AndroidLogViewer-windows-x64.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: AndroidLogViewer-windows-x64
          path: dist/AndroidLogViewer-windows-x64.zip
          if-no-files-found: error
          retention-days: 14
